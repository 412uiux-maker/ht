<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pet Platform — Hello World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* Токены из DESIGN.md (стиль референса HappyTails) */
    :root {
      --bg: #F1F2F4; --surface: #FFFFFF; --surface-2: #FBF4EE; --border: #EAEBEE;
      --text: #23282D; --text-muted: #6C7480;
      --primary: #F2784B; --primary-strong: #C0511F; --on-primary: #FFFFFF;
      --grad-warm: linear-gradient(135deg,#F8915A,#F26B47);
      --grad-peach: linear-gradient(180deg,#FFEAD7,#FCDCC4);
      --r-md: 16px; --r-lg: 24px; --r-xl: 32px; --r-pill: 999px;
      --shadow: 0 8px 28px rgba(35,40,45,.08);
      --font: "Onest", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#15171A; --surface:#1E2126; --surface-2:#26221F; --border:#2E323A;
              --text:#ECEEF0; --text-muted:#9BA2AD; --primary:#F2864B; }
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--font); background: var(--bg); color: var(--text);
           display: grid; place-items: center; min-height: 100vh; padding: 24px; }

    .card { position: relative; overflow: hidden; background: var(--surface);
            border: 1px solid var(--border); border-radius: var(--r-xl);
            padding: 40px 40px 36px; max-width: 540px; width: 100%; box-shadow: var(--shadow); }
    /* мягкое персиковое радиальное свечение в углу — как подложки 3D в референсе */
    .glow { position: absolute; width: 320px; height: 320px; right: -90px; top: -120px;
            background: radial-gradient(circle at center, #FFE0CB
