<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Добрые дела — HappyTails</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --coral:#F2784B;--coral-dark:#d95f30;--coral-light:#FEF0EA;
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--surface3:#2e2e2e;
  --text:#f5f5f5;--text2:#a0a0a0;--text3:#666;
  --green:#4CAF7D;--violet:#7C5CBF;--amber:#F5A623;--blue:#4A90D9;
  --r-sm:12px;--r-md:20px;--r-xl:32px;
  --font:'Onest',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* NAV */
.top-nav{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--surface)}
.nav-back{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px;line-height:1}
.nav-title{font-size:17px;font-weight:700;flex:1}
.nav-badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:99px;background:rgba(76,175,125,.15);color:var(--green)}

/* SCROLL */
.scroll-body{flex:1;overflow-y:auto;padding:16px 20px 100px}

/* HERO */
.hero{background:linear-gradient(135deg,#2ecc71 0%,#27ae60 100%);
  border-radius:var(--r-xl);padding:28px 24px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::after{content:'🐾';position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:80px;opacity:.18}
.hero-label{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.8;margin-bottom:8px}
.hero h1{font-size:26px;font-weight:800;line-height:1.2;margin-bottom:6px}
.hero p{font-size:14px;opacity:.85;line-height:1.5;margin-bottom:16px}
.hero-stats{display:flex;gap:20px}
.hero-stat{text-align:center}
.hero-stat-num{font-size:22px;font-weight:800}
.hero-stat-lbl{font-size:11px;opacity:.75;margin-top:2px}

/* FILTER TABS */
.filter-tabs{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
.filter-tabs::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:8px 18px;border-radius:99px;border:1.5px solid var(--surface3);
  background:none;color:var(--text2);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.filter-btn.active{background:var(--green);border-color:var(--green);color:#fff}

/* DEED CARDS */
.cards{display:flex;flex-direction:column;gap:14px}
.deed-card{background:var(--surface);border-radius:var(--r-md);padding:20px;cursor:pointer;
  transition:transform .15s;border:1.5px solid transparent}
.deed-card:active{transform:scale(.98)}
.deed-card.completed{border-color:var(--green);opacity:.8}
.deed-card-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.deed-emoji{font-size:38px;flex-shrink:0;line-height:1}
.deed-info{flex:1;min-width:0}
.deed-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;letter-spacing:.04em}
.badge-shelter{background:rgba(74,144,217,.15);color:var(--blue)}
.badge-rescue{background:rgba(242,120,75,.15);color:var(--coral)}
.badge-sterilization{background:rgba(124,92,191,.15);color:var(--violet)}
.badge-feeding{background:rgba(245,166,35,.15);color:var(--amber)}
.badge-adoption{background:rgba(46,204,113,.15);color:var(--green)}
.badge-other{background:rgba(160,160,160,.12);color:var(--text2)}
.badge-done{background:rgba(76,175,125,.2);color:var(--green)}
.deed-title{font-size:16px;font-weight:700;line-height:1.35;margin-bottom:4px}
.deed-subtitle{font-size:13px;color:var(--text2)}

/* PROGRESS BAR */
.deed-progress{margin-bottom:12px}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.progress-raised{font-size:15px;font-weight:700}
.progress-goal{font-size:12px;color:var(--text2)}
.bar-wrap{background:var(--surface3);border-radius:99px;height:6px;overflow:hidden}
.bar-fill{height:100%;background:var(--green);border-radius:99px;transition:width .6s ease}
.bar-fill.full{background:var(--green)}

/* DEED FOOTER */
.deed-footer{display:flex;align-items:center;justify-content:space-between}
.deed-meta{display:flex;gap:14px}
.meta-item{font-size:12px;color:var(--text3)}
.deed-participated{font-size:12px;font-weight:700;color:var(--green)}

/* ── DETAIL SCREEN ── */
.detail-hero{background:var(--surface);border-radius:var(--r-xl);padding:28px 24px;margin-bottom:16px}
.detail-emoji{font-size:52px;margin-bottom:14px;display:block}
.detail-title{font-size:24px;font-weight:800;line-height:1.3;margin-bottom:6px}
.detail-subtitle{font-size:15px;color:var(--text2);margin-bottom:16px}
.detail-desc{font-size:14px;line-height:1.7;color:rgba(245,245,245,.85)}

/* STATS ROW */
.stats-row{display:flex;gap:12px;margin-bottom:16px}
.stat-card{flex:1;background:var(--surface);border-radius:var(--r-sm);padding:14px;text-align:center}
.stat-num{font-size:20px;font-weight:800;color:var(--green)}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:3px}

/* PROGRESS SECTION */
.progress-section{background:var(--surface);border-radius:var(--r-md);padding:20px;margin-bottom:16px}
.section-title{font-size:15px;font-weight:700;margin-bottom:14px}
.big-bar-wrap{background:var(--surface3);border-radius:99px;height:10px;overflow:hidden;margin-bottom:10px}
.big-bar-fill{height:100%;background:var(--green);border-radius:99px;transition:width .8s ease}
.big-bar-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--text2)}
.big-bar-raised{font-size:22px;font-weight:800;color:var(--green);margin-bottom:4px}

/* PARTICIPATE SECTION */
.participate-section{background:var(--surface);border-radius:var(--r-md);padding:20px;margin-bottom:16px}
.part-options{display:flex;flex-direction:column;gap:12px}
.part-option{border-radius:var(--r-sm);border:1.5px solid var(--surface3);padding:16px;cursor:pointer;transition:border-color .2s}
.part-option.selected{border-color:var(--green)}
.part-option.done{border-color:rgba(76,175,125,.4);opacity:.7;cursor:default}
.part-option-top{display:flex;align-items:center;gap:12px}
.part-icon{font-size:24px;width:40px;text-align:center}
.part-info{flex:1}
.part-title{font-size:15px;font-weight:700}
.part-desc{font-size:12px;color:var(--text2);margin-top:2px}
.part-check{font-size:18px;color:var(--green)}

/* DONATE INPUT */
.donate-input-wrap{margin-top:12px;display:none}
.donate-input-wrap.show{display:block}
.donate-amounts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.amount-chip{padding:7px 16px;border-radius:99px;border:1.5px solid var(--surface3);
  background:none;color:var(--text2);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.amount-chip.active{background:var(--coral);border-color:var(--coral);color:#fff}
.amount-input{width:100%;background:var(--surface2);border:1.5px solid var(--surface3);border-radius:var(--r-sm);
  padding:12px 16px;color:var(--text);font-family:var(--font);font-size:15px;font-weight:600;outline:none}
.amount-input:focus{border-color:var(--coral)}
.amount-hint{font-size:12px;color:var(--text3);margin-top:6px}

/* BOTTOM ACTION */
.bottom-action{position:fixed;bottom:0;left:0;right:0;padding:16px 20px 28px;
  background:linear-gradient(to top,var(--bg) 70%,transparent);z-index:10}
.btn-primary{width:100%;padding:16px;border-radius:var(--r-md);background:var(--green);
  color:#fff;font-family:var(--font);font-size:16px;font-weight:700;border:none;cursor:pointer;transition:background .2s}
.btn-primary:disabled{background:var(--surface3);color:var(--text3);cursor:default}
.btn-primary.coral{background:var(--coral)}
.btn-primary.coral:hover{background:var(--coral-dark)}

/* EMPTY */
.empty{text-align:center;padding:60px 24px}
.empty-emoji{font-size:56px;margin-bottom:16px}
.empty-title{font-size:18px;font-weight:700;margin-bottom:8px}
.empty-text{font-size:14px;color:var(--text2);line-height:1.5}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface3);color:var(--text);padding:10px 20px;border-radius:99px;
  font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:99;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- SCREEN 1: CATALOG -->
<div id="screen-catalog" class="screen active">
  <div class="top-nav">
    <span class="nav-title">Добрые дела</span>
    <span class="nav-badge" id="active-count">...</span>
  </div>
  <div class="scroll-body">

    <div class="hero">
      <div class="hero-label">HappyTails Community</div>
      <h1>Помогаем<br>вместе</h1>
      <p>Поддержите приюты, спасательные<br>операции и бездомных животных</p>
      <div class="hero-stats">
        <div class="hero-stat">
          <div class="hero-stat-num" id="total-raised">—</div>
          <div class="hero-stat-lbl">собрано (сум)</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-num" id="total-participants">—</div>
          <div class="hero-stat-lbl">участников</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-num" id="total-deeds">—</div>
          <div class="hero-stat-lbl">инициатив</div>
        </div>
      </div>
    </div>

    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-btn active" data-cat="">Все</button>
      <button class="filter-btn" data-cat="shelter">Приюты</button>
      <button class="filter-btn" data-cat="rescue">Спасение</button>
      <button class="filter-btn" data-cat="sterilization">Стерилизация</button>
      <button class="filter-btn" data-cat="feeding">Кормление</button>
      <button class="filter-btn" data-cat="adoption">Питомцы в дом</button>
    </div>

    <div class="cards" id="cards-list">
      <div class="empty"><div class="empty-emoji">💚</div><div class="empty-title">Загружаем...</div></div>
    </div>
  </div>
</div>

<!-- SCREEN 2: DETAIL -->
<div id="screen-detail" class="screen">
  <div class="top-nav">
    <button class="nav-back" id="detail-back">←</button>
    <span class="nav-title">Инициатива</span>
  </div>
  <div class="scroll-body" id="detail-body"></div>
  <div class="bottom-action">
    <button class="btn-primary coral" id="detail-action-btn">Участвовать</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const OWNER_ID = (() => {
  let id = localStorage.getItem('ht_owner_id');
  if (!id) { id = crypto.randomUUID(); localStorage.setItem('ht_owner_id', id); }
  return id;
})();

let allDeeds = [];
let currentDeed = null;
let activeFilter = '';
let selectedType = null;
let donateAmount = 0;

const CAT_LABELS = {
  shelter: 'Приют', rescue: 'Спасение', sterilization: 'Стерилизация',
  feeding: 'Кормление', adoption: 'Питомцы в дом', other: 'Другое'
};

function fmt(n) { return n ? n.toLocaleString('ru-RU') : '0'; }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function pct(raised, goal) {
  if (!goal) return 0;
  return Math.min(100, Math.round(raised / goal * 100));
}

// ── CATALOG ──────────────────────────────────────────────
async function loadDeeds(category = '') {
  activeFilter = category;
  let url = `/api/deeds?owner_id=${OWNER_ID}`;
  if (category) url += `&category=${category}`;
  try {
    const r = await fetch(url);
    allDeeds = await r.json();
    renderCatalog();
  } catch (e) {
    document.getElementById('cards-list').innerHTML =
      '<div class="empty"><div class="empty-emoji">⚠️</div><div class="empty-title">Ошибка загрузки</div></div>';
  }
}

function renderCatalog() {
  const active = allDeeds.filter(d => d.status === 'active');
  document.getElementById('active-count').textContent = active.length + ' активных';

  const totalRaised = allDeeds.reduce((s, d) => s + (d.raised_amount || 0), 0);
  const totalParts = allDeeds.reduce((s, d) => s + (d.participants_count || 0), 0);
  document.getElementById('total-raised').textContent = totalRaised >= 1000000
    ? (totalRaised / 1000000).toFixed(1) + 'M'
    : fmt(totalRaised);
  document.getElementById('total-participants').textContent = totalParts;
  document.getElementById('total-deeds').textContent = allDeeds.length;

  if (!allDeeds.length) {
    document.getElementById('cards-list').innerHTML =
      '<div class="empty"><div class="empty-emoji">💭</div><div class="empty-title">Нет инициатив</div><div class="empty-text">Попробуйте другой фильтр</div></div>';
    return;
  }

  document.getElementById('cards-list').innerHTML = allDeeds.map(d => {
    const p = pct(d.raised_amount, d.goal_amount);
    const participated = d.my_types && d.my_types.length > 0;
    const done = d.status === 'completed';
    return `
    <div class="deed-card${done ? ' completed' : ''}" onclick="openDeed(${d.id})">
      <div class="deed-card-top">
        <div class="deed-emoji">${d.emoji}</div>
        <div class="deed-info">
          <div class="deed-badges">
            <span class="badge badge-${d.category}">${CAT_LABELS[d.category] || d.category}</span>
            ${done ? '<span class="badge badge-done">✓ Завершено</span>' : ''}
            ${participated ? '<span class="badge badge-done">✓ Участвую</span>' : ''}
          </div>
          <div class="deed-title">${d.title}</div>
          <div class="deed-subtitle">${d.subtitle || ''}</div>
        </div>
      </div>
      ${d.goal_amount ? `
      <div class="deed-progress">
        <div class="progress-row">
          <span class="progress-raised">${fmt(d.raised_amount)} сум</span>
          <span class="progress-goal">из ${fmt(d.goal_amount)}</span>
        </div>
        <div class="bar-wrap"><div class="bar-fill${p >= 100 ? ' full' : ''}" style="width:${p}%"></div></div>
      </div>` : ''}
      <div class="deed-footer">
        <div class="deed-meta">
          <span class="meta-item">👥 ${d.participants_count} участников</span>
          ${d.deadline ? `<span class="meta-item">📅 до ${new Date(d.deadline).toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}</span>` : ''}
        </div>
        ${participated ? '<span class="deed-participated">✓ Участвую</span>' : '<span style="font-size:18px">→</span>'}
      </div>
    </div>`;
  }).join('');
}

// ── DETAIL ───────────────────────────────────────────────
async function openDeed(id) {
  try {
    const r = await fetch(`/api/deeds/${id}?owner_id=${OWNER_ID}`);
    currentDeed = await r.json();
  } catch (e) { showToast('Ошибка загрузки'); return; }
  renderDetail();
  showScreen('screen-detail');
}

function renderDetail() {
  const d = currentDeed;
  const p = pct(d.raised_amount, d.goal_amount);
  const isDone = d.status === 'completed';

  const myDonate  = d.my_types.includes('donate');
  const myVol     = d.my_types.includes('volunteer');
  const myShare   = d.my_types.includes('share');

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-hero">
      <span class="detail-emoji">${d.emoji}</span>
      <div class="deed-badges" style="margin-bottom:10px">
        <span class="badge badge-${d.category}">${CAT_LABELS[d.category] || d.category}</span>
        ${isDone ? '<span class="badge badge-done">✓ Завершено</span>' : ''}
      </div>
      <div class="detail-title">${d.title}</div>
      <div class="detail-subtitle">${d.subtitle || ''}</div>
      <div class="detail-desc">${d.description || ''}</div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num">👥 ${d.participants_count}</div>
        <div class="stat-lbl">участников</div>
      </div>
      ${d.deadline ? `<div class="stat-card">
        <div class="stat-num" style="font-size:15px">📅 ${new Date(d.deadline).toLocaleDateString('ru-RU',{day:'numeric',month:'long'})}</div>
        <div class="stat-lbl">дедлайн</div>
      </div>` : ''}
    </div>

    ${d.goal_amount ? `
    <div class="progress-section">
      <div class="section-title">Прогресс сбора</div>
      <div class="big-bar-raised">${fmt(d.raised_amount)} сум</div>
      <div class="big-bar-wrap"><div class="big-bar-fill" style="width:${p}%"></div></div>
      <div class="big-bar-labels">
        <span>${p}% выполнено</span>
        <span>цель: ${fmt(d.goal_amount)} сум</span>
      </div>
    </div>` : ''}

    ${!isDone ? `
    <div class="participate-section" id="participate-section">
      <div class="section-title">Как помочь</div>
      <div class="part-options">

        <div class="part-option${myDonate ? ' done' : ''}" id="opt-donate" onclick="selectType('donate')">
          <div class="part-option-top">
            <div class="part-icon">💳</div>
            <div class="part-info">
              <div class="part-title">Донат</div>
              <div class="part-desc">Перевести деньги на нужды инициативы</div>
            </div>
            ${myDonate ? '<span class="part-check">✓</span>' : ''}
          </div>
          ${!myDonate ? `<div class="donate-input-wrap" id="donate-input-wrap">
            <div class="donate-amounts">
              <button class="amount-chip" onclick="setAmount(event,10000)">10 000</button>
              <button class="amount-chip" onclick="setAmount(event,50000)">50 000</button>
              <button class="amount-chip" onclick="setAmount(event,100000)">100 000</button>
              <button class="amount-chip" onclick="setAmount(event,500000)">500 000</button>
            </div>
            <input class="amount-input" id="amount-input" type="number" min="1000" step="1000"
              placeholder="Сумма в UZS" oninput="onAmountInput(this.value)">
            <div class="amount-hint">Минимум 1 000 сум</div>
          </div>` : ''}
        </div>

        <div class="part-option${myVol ? ' done' : ''}" id="opt-volunteer" onclick="selectType('volunteer')">
          <div class="part-option-top">
            <div class="part-icon">🙋</div>
            <div class="part-info">
              <div class="part-title">Волонтёр</div>
              <div class="part-desc">Помочь физически — выгул, передержка, транспорт</div>
            </div>
            ${myVol ? '<span class="part-check">✓</span>' : ''}
          </div>
        </div>

        <div class="part-option${myShare ? ' done' : ''}" id="opt-share" onclick="selectType('share')">
          <div class="part-option-top">
            <div class="part-icon">📢</div>
            <div class="part-info">
              <div class="part-title">Репост</div>
              <div class="part-desc">Рассказать друзьям — это тоже помощь</div>
            </div>
            ${myShare ? '<span class="part-check">✓</span>' : ''}
          </div>
        </div>

      </div>
    </div>` : `
    <div style="background:rgba(76,175,125,.1);border:1.5px solid rgba(76,175,125,.3);border-radius:var(--r-md);padding:20px;text-align:center;margin-bottom:16px">
      <div style="font-size:32px;margin-bottom:8px">🎉</div>
      <div style="font-size:16px;font-weight:700;color:var(--green)">Инициатива завершена!</div>
      <div style="font-size:13px;color:var(--text2);margin-top:6px">Благодаря участникам цель была достигнута</div>
    </div>`}
  `;

  const btn = document.getElementById('detail-action-btn');
  if (isDone) {
    btn.textContent = '✅ Инициатива завершена';
    btn.disabled = true;
  } else {
    btn.textContent = 'Выберите способ участия ↑';
    btn.disabled = true;
    btn.onclick = doParticipate;
  }

  selectedType = null;
  donateAmount = 0;
}

function selectType(type) {
  const deed = currentDeed;
  const myDonate  = deed.my_types.includes('donate');
  const myVol     = deed.my_types.includes('volunteer');
  const myShare   = deed.my_types.includes('share');

  if (type === 'donate' && myDonate) return;
  if (type === 'volunteer' && myVol) return;
  if (type === 'share' && myShare) return;

  selectedType = type;

  ['donate','volunteer','share'].forEach(t => {
    const el = document.getElementById(`opt-${t}`);
    if (el && !deed.my_types.includes(t)) el.classList.remove('selected');
  });

  const opt = document.getElementById(`opt-${type}`);
  if (opt) opt.classList.add('selected');

  const wrap = document.getElementById('donate-input-wrap');
  if (wrap) wrap.classList.toggle('show', type === 'donate');

  updateActionBtn();
}

function setAmount(e, val) {
  e.stopPropagation();
  document.querySelectorAll('.amount-chip').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('amount-input').value = val;
  donateAmount = val;
  updateActionBtn();
}

function onAmountInput(val) {
  donateAmount = parseInt(val) || 0;
  document.querySelectorAll('.amount-chip').forEach(c => c.classList.remove('active'));
  updateActionBtn();
}

function updateActionBtn() {
  const btn = document.getElementById('detail-action-btn');
  if (!selectedType) { btn.disabled = true; btn.textContent = 'Выберите способ участия ↑'; return; }
  if (selectedType === 'donate') {
    if (donateAmount < 1000) { btn.disabled = true; btn.textContent = 'Введите сумму (мин. 1 000 сум)'; return; }
    btn.disabled = false;
    btn.textContent = `Задонатить ${fmt(donateAmount)} сум 💳`;
  } else if (selectedType === 'volunteer') {
    btn.disabled = false; btn.textContent = 'Записаться волонтёром 🙋';
  } else {
    btn.disabled = false; btn.textContent = 'Поделиться и поддержать 📢';
  }
}

async function doParticipate() {
  if (!selectedType) return;
  const btn = document.getElementById('detail-action-btn');
  btn.disabled = true;
  const prev = btn.textContent;
  btn.textContent = 'Отправляем...';

  const body = { owner_id: OWNER_ID, type: selectedType };
  if (selectedType === 'donate') body.amount_uzs = donateAmount;

  try {
    const r = await fetch(`/api/deeds/${currentDeed.id}/participate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (r.status === 409) {
      showToast('Вы уже участвуете таким образом');
      btn.disabled = false; btn.textContent = prev; return;
    }
    if (!r.ok) throw new Error(await r.text());
    const updated = await r.json();

    currentDeed.my_types.push(selectedType);
    currentDeed.raised_amount = updated.raised_amount;
    currentDeed.participants_count = updated.participants_count;

    const msgs = { donate: '💳 Донат отправлен! Спасибо!', volunteer: '🙋 Вы записаны волонтёром!', share: '📢 Спасибо за поддержку!' };
    showToast(msgs[selectedType]);
    selectedType = null;
    renderDetail();
  } catch (e) {
    btn.disabled = false; btn.textContent = prev;
    showToast('Ошибка: ' + e.message);
  }
}

// ── FILTER TABS ─────────────────────────────────────────
document.getElementById('filter-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadDeeds(btn.dataset.cat);
});

document.getElementById('detail-back').onclick = () => {
  showScreen('screen-catalog');
  loadDeeds(activeFilter);
};

// ── INIT ────────────────────────────────────────────────
loadDeeds();
</script>
