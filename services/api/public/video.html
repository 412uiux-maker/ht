<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Видеозвонок — HappyTails</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; background: #000; font-family: 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  overflow: hidden; color: #fff; user-select: none;
}

/* ── REMOTE VIDEO (main / fullscreen) ─────────────────── */
#remote-vid {
  position: fixed; inset: 0; width: 100%; height: 100%;
  object-fit: cover; background: #111; z-index: 1;
}

/* ── GRADIENTS ────────────────────────────────────────── */
.grad-top {
  position: fixed; top: 0; left: 0; right: 0; height: 140px;
  background: linear-gradient(to bottom, rgba(0,0,0,.55), transparent);
  z-index: 3; pointer-events: none;
}
.grad-bottom {
  position: fixed; bottom: 0; left: 0; right: 0; height: 260px;
  background: linear-gradient(to top, rgba(0,0,0,.65) 40%, transparent);
  z-index: 3; pointer-events: none;
}

/* ── BACK BUTTON ──────────────────────────────────────── */
#back-btn {
  position: fixed; top: 20px; left: 20px; z-index: 10;
  width: 44px; height: 44px; border-radius: 14px;
  background: rgba(255,255,255,.9); backdrop-filter: blur(12px);
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #111; transition: transform .15s;
}
#back-btn:active { transform: scale(.92); }

/* ── LOCAL VIDEO (PiP) ────────────────────────────────── */
#pip-wrap {
  position: fixed; top: 18px; right: 18px; z-index: 10;
  width: 130px; height: 180px; border-radius: 20px;
  overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,.45);
  background: #1a1a1a;
}
#local-vid {
  width: 100%; height: 100%; object-fit: cover;
  transform: scaleX(-1); /* mirror effect */
}
.pip-mic {
  position: absolute; bottom: 8px; left: 10px;
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(0,0,0,.5); backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center; font-size: 13px;
}
.pip-flip {
  position: absolute; bottom: 8px; right: 10px;
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,.18); backdrop-filter: blur(8px);
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 16px; transition: transform .3s;
}
.pip-flip:active { transform: rotate(180deg); }

/* ── WAITING OVERLAY ──────────────────────────────────── */
#waiting {
  position: fixed; inset: 0; z-index: 5;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
  gap: 16px;
}
#waiting .w-emoji { font-size: 64px; }
#waiting .w-title { font-size: 22px; font-weight: 700; }
#waiting .w-sub   { font-size: 14px; opacity: .7; text-align: center; line-height: 1.5; padding: 0 32px; }
.w-dots { display: flex; gap: 6px; }
.w-dots span {
  width: 8px; height: 8px; border-radius: 50%; background: #fff;
  animation: dotpulse 1.2s ease-in-out infinite;
}
.w-dots span:nth-child(2) { animation-delay: .2s; }
.w-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes dotpulse { 0%,100%{opacity:.25;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }

.w-copy-btn {
  margin-top: 8px; padding: 11px 22px; border-radius: 99px;
  background: rgba(255,255,255,.15); border: 1.5px solid rgba(255,255,255,.3);
  color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
  backdrop-filter: blur(8px); transition: background .2s;
}
.w-copy-btn:hover { background: rgba(255,255,255,.25); }

/* ── INFO STRIP ───────────────────────────────────────── */
#info-strip {
  position: fixed; bottom: 92px; left: 16px; right: 16px; z-index: 10;
  background: rgba(255,255,255,.92); backdrop-filter: blur(16px);
  border-radius: 20px; padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
}
.info-avatar {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg,#FFEAD7,#FCDCC4);
  display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0;
}
.info-text { flex: 1; min-width: 0; }
.info-name { font-size: 16px; font-weight: 700; color: #111; line-height: 1.2; }
.info-spec { font-size: 13px; color: #666; margin-top: 2px; }
.info-timer {
  display: flex; align-items: center; gap: 6px;
  font-size: 15px; font-weight: 700; color: #111; font-variant-numeric: tabular-nums;
}
.timer-dot {
  width: 9px; height: 9px; border-radius: 50%; background: #E5534A;
  animation: timerPulse 1s ease-in-out infinite;
}
@keyframes timerPulse { 0%,100%{opacity:1} 50%{opacity:.45} }
.info-timer.warn { color: #C77700; }
.info-timer.warn .timer-dot { background: #E8911A; }
.info-timer.crit { color: #E5534A; }

/* ── TIME BANNER (soft over-time / warning) ───────────── */
#time-banner {
  position: fixed; left: 16px; right: 16px; bottom: 160px; z-index: 11;
  display: none; align-items: center; gap: 10px;
  background: rgba(229,83,74,.95); color: #fff; backdrop-filter: blur(12px);
  border-radius: 16px; padding: 12px 16px; font-size: 14px; font-weight: 600;
  box-shadow: 0 8px 28px rgba(0,0,0,.35);
  animation: bannerIn .35s ease;
}
#time-banner.show { display: flex; }
#time-banner.amber { background: rgba(232,145,26,.95); }
@keyframes bannerIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* ── CONTROLS BAR ─────────────────────────────────────── */
#controls {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
  padding: 0 24px 36px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.ctrl-btn {
  width: 60px; height: 60px; border-radius: 99px; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 22px; transition: transform .15s, opacity .15s;
  background: rgba(255,255,255,.18); backdrop-filter: blur(10px); color: #fff;
  box-shadow: 0 4px 16px rgba(0,0,0,.25);
}
.ctrl-btn:active { transform: scale(.9); }
.ctrl-btn.off { background: rgba(255,255,255,.35); }
.ctrl-btn.off svg, .ctrl-btn.off .icon { opacity: .4; }
.ctrl-end {
  width: 64px; height: 64px; background: #E5534A;
  box-shadow: 0 6px 20px rgba(229,83,74,.5);
}
.ctrl-end:active { transform: scale(.88); }
.ctrl-chat { background: rgba(124,92,191,.75); }

/* ── ENDED OVERLAY ────────────────────────────────────── */
#ended {
  display: none; position: fixed; inset: 0; z-index: 20;
  background: rgba(0,0,0,.8); backdrop-filter: blur(8px);
  flex-direction: column; align-items: center; justify-content: center; gap: 14px;
}
#ended.show { display: flex; }
#ended .e-emoji { font-size: 56px; }
#ended .e-title { font-size: 22px; font-weight: 700; }
#ended .e-sub   { font-size: 14px; opacity: .7; }
#ended .e-back  {
  margin-top: 8px; padding: 14px 32px; border-radius: 99px;
  background: rgba(255,255,255,.15); border: 1.5px solid rgba(255,255,255,.25);
  color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
}

/* ── NO CAMERA PLACEHOLDER ────────────────────────────── */
#no-cam {
  display: none; position: fixed; inset: 0; z-index: 2;
  background: #1a1a1a; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; color: rgba(255,255,255,.6); font-size: 14px;
}
#no-cam .nc-emoji { font-size: 52px; margin-bottom: 6px; }
</style>
</head>
<body>

<!-- Remote video (full screen) -->
<video id="remote-vid" autoplay playsinline></video>

<!-- No camera placeholder -->
<div id="no-cam">
  <div class="nc-emoji">📷</div>
  <div>Нет доступа к камере</div>
  <div style="font-size:12px;opacity:.5">Разрешите доступ в настройках браузера</div>
</div>

<!-- Gradients -->
<div class="grad-top"></div>
<div class="grad-bottom"></div>

<!-- Back button -->
<button id="back-btn" onclick="goBack()">←</button>

<!-- PiP local video -->
<div id="pip-wrap">
  <video id="local-vid" autoplay playsinline muted></video>
  <div class="pip-mic" id="pip-mic">🎤</div>
  <button class="pip-flip" id="flip-btn" onclick="flipCamera()" title="Переключить камеру">↺</button>
</div>

<!-- Waiting overlay -->
<div id="waiting">
  <div class="w-emoji">🩺</div>
  <div class="w-title">Ожидание врача…</div>
  <div class="w-sub">Ссылка для врача скопирована.<br>Отправьте её ветеринару для начала звонка.</div>
  <div class="w-dots"><span></span><span></span><span></span></div>
  <button class="w-copy-btn" id="copy-vet-link" onclick="copyVetLink()">📋 Скопировать ссылку врача</button>
</div>

<!-- Info strip -->
<div id="info-strip" style="display:none">
  <div class="info-avatar" id="info-avatar">👨‍⚕️</div>
  <div class="info-text">
    <div class="info-name" id="info-name">Ветеринар</div>
    <div class="info-spec" id="info-spec">Онлайн-консультация</div>
  </div>
  <div class="info-timer">
    <span id="timer-txt">0:00</span>
    <div class="timer-dot" id="timer-dot" style="display:none"></div>
  </div>
</div>

<!-- Time banner (warning / over-time) -->
<div id="time-banner"><span id="time-banner-txt"></span></div>

<!-- Controls -->
<div id="controls">
  <button class="ctrl-btn" id="mic-btn" onclick="toggleMic()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </button>
  <button class="ctrl-btn" id="cam-btn" onclick="toggleCam()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
    </svg>
  </button>
  <button class="ctrl-btn ctrl-end" onclick="endCall()">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45c.98.37 2.05.57 3.16.57a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1C9.86 19.77 4.23 14.14 4 5a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1c0 1.11.2 2.18.57 3.16a2 2 0 0 1-.45 2.11z"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    </svg>
  </button>
  <button class="ctrl-btn ctrl-chat" onclick="goToChat()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </button>
</div>

<!-- Ended overlay -->
<div id="ended">
  <div class="e-emoji">📵</div>
  <div class="e-title">Звонок завершён</div>
  <div class="e-sub" id="ended-dur"></div>
  <button class="e-back" onclick="goBack()">← Вернуться к консультации</button>
</div>

<script>
// ── URL params ──────────────────────────────────────────────
const params   = new URLSearchParams(location.search);
const CONSULT_ID = params.get('id');
const ROLE       = params.get('role') || 'client'; // 'client' | 'vet'

if (!CONSULT_ID) {
  document.getElementById('waiting').querySelector('.w-title').textContent = 'Нет ID консультации';
}

// ── State ───────────────────────────────────────────────────
let localStream  = null;
let pc           = null;
let ws           = null;
let micOn        = true;
let camOn        = true;
let facingMode   = 'user';
let callStart    = null;
let timerInterval = null;
let iceBuf       = [];
let remoteDescSet = false;
let isInitiator  = false; // client creates offer
let connected    = false; // peer connection established
let ringTimeout  = null;  // client: no-answer timer
let durationMs   = 0;     // consultation length from tariff
let serverOffset = 0;     // serverNow - clientNow (clock skew correction)
let warnAmberShown = false, warnCritShown = false, overtimeShown = false;

// consultation data (filled by loadVetInfo)
let CONSULT = null;

// ── STUN servers (public Google) ────────────────────────────
const RTC_CONFIG = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
  ]
};

// ── Load vet info from consultation ────────────────────────
async function loadVetInfo() {
  if (!CONSULT_ID) return;
  try {
    const r = await fetch('/api/consultations/' + CONSULT_ID);
    if (!r.ok) return;
    const { consultation: c } = await r.json();
    if (c) {
      CONSULT = c;
      document.getElementById('info-name').textContent = c.vet_name || 'Ветеринар';
      document.getElementById('info-spec').textContent = c.specialty || 'Онлайн-консультация';
      // Waiting overlay copy depends on role
      const wt = document.querySelector('#waiting .w-title');
      const wsub = document.querySelector('#waiting .w-sub');
      if (ROLE === 'client') {
        if (wt)  wt.textContent = 'Вызываем врача…';
        if (wsub) wsub.textContent = `${c.vet_name || 'Ветеринар'} получает уведомление о вызове.`;
      } else {
        if (wt)  wt.textContent = 'Подключение…';
        if (wsub) wsub.textContent = `Консультация для ${c.pet_name || 'питомца'}.`;
      }
    }
  } catch {}
}

// ── Camera init ─────────────────────────────────────────────
async function startLocalCamera() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: true
    });
    document.getElementById('local-vid').srcObject = localStream;
  } catch (e) {
    console.warn('Camera error:', e);
    document.getElementById('no-cam').style.display = 'flex';
    // Continue without local stream (audio only fallback)
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch {}
  }
}

async function flipCamera() {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  try {
    const newStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    const newTrack = newStream.getVideoTracks()[0];
    document.getElementById('local-vid').srcObject = newStream;

    if (pc && localStream) {
      const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
      if (sender) await sender.replaceTrack(newTrack);
      // Stop old video tracks
      localStream.getVideoTracks().forEach(t => t.stop());
      // Merge new video track into existing stream
      localStream.getVideoTracks().forEach(t => localStream.removeTrack(t));
      localStream.addTrack(newTrack);
    } else {
      localStream = newStream;
    }
  } catch (e) { console.warn('Flip error:', e); }
}

// ── Controls ────────────────────────────────────────────────
function toggleMic() {
  micOn = !micOn;
  if (localStream) {
    localStream.getAudioTracks().forEach(t => t.enabled = micOn);
  }
  const btn = document.getElementById('mic-btn');
  btn.classList.toggle('off', !micOn);
  btn.querySelector('svg').style.opacity = micOn ? '' : '.35';
  document.getElementById('pip-mic').textContent = micOn ? '🎤' : '🔇';
}

function toggleCam() {
  camOn = !camOn;
  if (localStream) {
    localStream.getVideoTracks().forEach(t => t.enabled = camOn);
  }
  const btn = document.getElementById('cam-btn');
  btn.classList.toggle('off', !camOn);
  btn.querySelector('svg').style.opacity = camOn ? '' : '.35';
}

// ── Timer (countdown to end of consultation) ────────────────
function fmt(totalSec) {
  const s = Math.max(0, Math.floor(totalSec));
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

async function startTimer() {
  document.getElementById('timer-dot').style.display = '';
  // Authoritative start + tariff duration from the server (idempotent)
  try {
    const r = await fetch('/api/consultations/' + CONSULT_ID + '/call/start', { method: 'POST' });
    const d = await r.json();
    callStart    = Date.parse(d.call_started_at);
    durationMs   = (d.duration_min || 30) * 60000;
    if (d.now) serverOffset = Date.parse(d.now) - Date.now();
  } catch {
    callStart  = Date.now();
    durationMs = 30 * 60000;
  }
  tickTimer();
  timerInterval = setInterval(tickTimer, 1000);
}

function tickTimer() {
  const nowSrv    = Date.now() + serverOffset;
  const remaining = durationMs - (nowSrv - callStart); // ms
  const el   = document.getElementById('timer-txt');
  const strip = document.querySelector('#info-strip .info-timer');

  if (remaining > 0) {
    el.textContent = fmt(remaining / 1000);
    if (remaining <= 30000) {
      strip.classList.add('crit'); strip.classList.remove('warn');
      if (!warnCritShown) { warnCritShown = true; showBanner('Осталось меньше минуты до конца консультации', 'amber', 6000); }
    } else if (remaining <= 120000) {
      strip.classList.add('warn');
      if (!warnAmberShown) { warnAmberShown = true; showBanner('До конца консультации 2 минуты', 'amber', 5000); }
    }
  } else {
    // Soft over-time: keep the call alive, just inform.
    el.textContent = '0:00';
    strip.classList.add('crit'); strip.classList.remove('warn');
    if (!overtimeShown) {
      overtimeShown = true;
      showBanner('Время консультации истекло. Можно завершить звонок.', '', 0);
    }
  }
}

let bannerTimer = null;
function showBanner(text, cls, autoHideMs) {
  const b = document.getElementById('time-banner');
  document.getElementById('time-banner-txt').textContent = text;
  b.classList.remove('amber');
  if (cls) b.classList.add(cls);
  b.classList.add('show');
  if (bannerTimer) { clearTimeout(bannerTimer); bannerTimer = null; }
  if (autoHideMs > 0) bannerTimer = setTimeout(() => b.classList.remove('show'), autoHideMs);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function callDuration() {
  if (!callStart) return '';
  const elapsed = (Date.now() + serverOffset - callStart) / 1000;
  return `Длительность: ${fmt(elapsed)}`;
}

// ── Navigation ───────────────────────────────────────────────
function goBack() { cleanup(); location.href = CONSULT_ID ? `/consult.html?id=${CONSULT_ID}` : '/consult.html'; }
function goToChat() { cleanup(); location.href = CONSULT_ID ? `/consult.html?id=${CONSULT_ID}` : '/consult.html'; }

function endCall() {
  stopTimer();
  document.getElementById('ended-dur').textContent = callDuration();
  document.getElementById('ended').classList.add('show');
  cleanup(false);
}

function cleanup(navigate = false) {
  stopTimer();
  clearRingTimeout();
  if (!connected) cancelCall(); // hung up before the vet picked up
  if (pc) { pc.close(); pc = null; }
  if (ws) { ws.close(); ws = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (navigate) goBack();
}

function copyVetLink() {
  const vetUrl = `${location.origin}/video.html?id=${CONSULT_ID}&role=vet`;
  navigator.clipboard.writeText(vetUrl).then(() => {
    const btn = document.getElementById('copy-vet-link');
    btn.textContent = '✓ Скопировано!';
    setTimeout(() => btn.textContent = '📋 Скопировать ссылку врача', 2500);
  });
}

// ── WebRTC ──────────────────────────────────────────────────
function createPeerConnection() {
  pc = new RTCPeerConnection(RTC_CONFIG);

  // Add local tracks
  if (localStream) {
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  }

  // Remote stream → remote video element
  const remoteStream = new MediaStream();
  document.getElementById('remote-vid').srcObject = remoteStream;
  pc.ontrack = (e) => { remoteStream.addTrack(e.track); };

  // ICE candidates → signaling
  pc.onicecandidate = (e) => {
    if (e.candidate && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'ice', candidate: e.candidate }));
    }
  };

  pc.onconnectionstatechange = () => {
    if (pc && pc.connectionState === 'connected') {
      onCallConnected();
    }
    if (pc && (pc.connectionState === 'disconnected' || pc.connectionState === 'failed')) {
      onPeerLeft();
    }
  };

  return pc;
}

async function flushIceBuf() {
  for (const candidate of iceBuf) {
    try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch {}
  }
  iceBuf = [];
}

async function createAndSendOffer() {
  if (!pc) return;
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  ws.send(JSON.stringify({ type: 'offer', sdp: offer }));
}

// ── Signaling WS ─────────────────────────────────────────────
function connectSignaling() {
  const wsUrl = `ws://${location.host}/ws/signal`;
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join', room: CONSULT_ID, role: ROLE }));
    if (ROLE === 'client') {
      // Ring the vet's cabinet
      ws.send(JSON.stringify({
        type: 'call-invite',
        room: CONSULT_ID,
        vet_id: CONSULT && CONSULT.vet_id,
        client_name: CONSULT && CONSULT.client_name,
        pet_name: CONSULT && CONSULT.pet_name,
        pet_species: CONSULT && CONSULT.pet_species,
        problem: CONSULT && CONSULT.problem,
      }));
      startRingTimeout();
    }
  };

  ws.onmessage = async (evt) => {
    let msg;
    try { msg = JSON.parse(evt.data); } catch { return; }

    switch (msg.type) {
      case 'peer-joined':
        // The other side joined the room → the vet picked up. Stop ringing.
        clearRingTimeout();
        // One of us just joined. The 'client' side initiates.
        if (ROLE === 'client') {
          isInitiator = true;
          createPeerConnection();
          await createAndSendOffer();
        } else if (ROLE === 'vet') {
          if (!pc) createPeerConnection();
        }
        break;

      case 'call-declined':
        showCallFailed('Врач отклонил вызов', 'Попробуйте позвонить позже или напишите в чат.');
        break;

      case 'offer':
        if (!pc) createPeerConnection();
        await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
        remoteDescSet = true;
        await flushIceBuf();
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        ws.send(JSON.stringify({ type: 'answer', sdp: answer }));
        break;

      case 'answer':
        if (pc && !remoteDescSet) {
          await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
          remoteDescSet = true;
          await flushIceBuf();
        }
        break;

      case 'ice':
        if (pc && remoteDescSet) {
          try { await pc.addIceCandidate(new RTCIceCandidate(msg.candidate)); } catch {}
        } else {
          iceBuf.push(msg.candidate);
        }
        break;

      case 'peer-left':
        onPeerLeft();
        break;
    }
  };

  ws.onclose = () => {};
  ws.onerror = () => {};
}

function onCallConnected() {
  connected = true;
  clearRingTimeout();
  document.getElementById('waiting').style.display = 'none';
  document.getElementById('info-strip').style.display = 'flex';
  startTimer();
}

function onPeerLeft() {
  if (!document.getElementById('ended').classList.contains('show')) {
    endCall();
  }
}

// ── Ring lifecycle (client side) ────────────────────────────
function startRingTimeout() {
  clearRingTimeout();
  ringTimeout = setTimeout(() => {
    if (!connected) showCallFailed('Врач не ответил', 'Ветеринар сейчас недоступен. Попробуйте позже или напишите в чат.');
  }, 45000);
}
function clearRingTimeout() {
  if (ringTimeout) { clearTimeout(ringTimeout); ringTimeout = null; }
}

function cancelCall() {
  // Tell the vet's cabinet to stop ringing
  if (ws && ws.readyState === WebSocket.OPEN && ROLE === 'client' && CONSULT) {
    ws.send(JSON.stringify({ type: 'call-cancel', room: CONSULT_ID, vet_id: CONSULT.vet_id }));
  }
}

function showCallFailed(title, sub) {
  clearRingTimeout();
  cancelCall();
  const w = document.getElementById('waiting');
  w.style.display = 'flex';
  w.querySelector('.w-emoji').textContent = '📵';
  w.querySelector('.w-title').textContent = title;
  w.querySelector('.w-sub').textContent = sub;
  const dots = w.querySelector('.w-dots'); if (dots) dots.style.display = 'none';
  const copyBtn = document.getElementById('copy-vet-link'); if (copyBtn) copyBtn.style.display = 'none';
  cleanup(false);
}

// ── Init ─────────────────────────────────────────────────────
async function init() {
  await loadVetInfo();
  await startLocalCamera();
  if (CONSULT_ID) {
    connectSignaling();
  }
}

init();
</script>
