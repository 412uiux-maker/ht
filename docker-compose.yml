services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    image: petplatform-api
    container_name: petplatform-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 8080
      DATABASE_URL: postgresql://petplatform:petplatform@db:5432/petplatform
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      MINI_APP_URL: ${MINI_APP_URL:-https://t.me/HappyTailsUzBot/app}
      BOT_USERNAME: ${BOT_USERNAME:-HappyTailsUzBot}
      CLICK_MERCHANT_ID: ${CLICK_MERCHANT_ID:-}
      PAYME_MERCHANT_ID: ${PAYME_MERCHANT_ID:-}
      UZUM_MERCHANT_ID: ${UZUM_MERCHANT_ID:-}
      UZUM_SECRET_KEY: ${UZUM_SECRET_KEY:-}
      CLICK_SERVICE_ID: ${CLICK_SERVICE_ID:-}
      CLICK_SECRET_KEY: ${CLICK_SECRET_KEY:-}
      PAYME_SECRET_KEY: ${PAYME_SECRET_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  couples:
    build:
      context: .
      dockerfile: apps/couples/Dockerfile
    image: petplatform-couples
    container_name: petplatform-couples
    restart: unless-stopped
    ports:
      - "5001:80"
    depends_on:
      api:
        condition: service_healthy

  vendor:
    build:
      context: .
      dockerfile: apps/vendor/Dockerfile
    image: petplatform-vendor
    container_name: petplatform-vendor
    restart: unless-stopped
    ports:
      - "5002:80"
    depends_on:
      api:
        condition: service_healthy

  telegram-bot:
    build:
      context: .
      dockerfile: apps/telegram-bot/Dockerfile
    image: petplatform-telegram-bot
    container_name: petplatform-telegram-bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      API_BASE_URL: http://petplatform-api:8080
      MINI_APP_URL: ${MINI_APP_URL:-https://t.me/HappyTailsUzBot/app}
      BOT_USERNAME: ${BOT_USERNAME:-HappyTailsUzBot}
    depends_on:
      api:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    image: petplatform-admin
    container_name: petplatform-admin
    restart: unless-stopped
    ports:
      - "3003:80"
    depends_on:
      api:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: petplatform-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: petplatform
      POSTGRES_PASSWORD: petplatform
      POSTGRES_DB: petplatform
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petplatform -d petplatform"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
